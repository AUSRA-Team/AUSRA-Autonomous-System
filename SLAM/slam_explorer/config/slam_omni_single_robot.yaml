slam_toolbox:
  ros__parameters:

    # Plugin params
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: HuberLoss

    # ROS Parameters
    odom_frame: odom
    map_frame: map
    base_frame: robot_footprint
    scan_topic: /scan
    use_map_saver: true
    mode: mapping

    # map_saver_filename: room_map

    # if you'd like to immediately start continuing a map at a given pose
    # or at the dock, but they are mutually exclusive, if pose is given
    # will use pose
    # map_file_name: ~/ros2_ws/map/room1_map
    # map_start_pose: [0.0, 0.0, 0.0]
    # map_start_at_dock: true

    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02 #if 0 never publishes odometry
    map_update_interval: 1.0
    resolution: 0.05
    restamp_tf: false
    min_laser_range: 0.2 #for rastering images
    max_laser_range: 10.0 #for rastering images
    minimum_time_interval: 0.5
    transform_timeout: 0.2
    tf_buffer_duration: 30.
    stack_size_to_use: 40000000 #// program needs a larger stack size to serialize large maps
    enable_interactive_mode: true

    # General Parameters
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.1
    minimum_travel_heading: 1.0
    check_min_dist_and_heading_precisely: false
    scan_buffer_size: 50
    scan_buffer_maximum_scan_distance: 20.0
    link_match_minimum_response_fine: 0.2
    link_scan_maximum_distance: 2.5
    
    do_loop_closing: true
    loop_search_maximum_distance: 0.5
    loop_match_minimum_chain_size: 30
    loop_match_maximum_variance_coarse: 1.0
    loop_match_minimum_response_coarse: 1.3
    loop_match_minimum_response_fine: 1.5

    # Correlation Parameters
    # A larger dimension helps if the robot moves fast. 
    # A smaller resolution makes the map "sharper".
    correlation_search_space_dimension: 0.1
    correlation_search_space_resolution: 0.005 # TUNED: 0.01 -> 0.005 (Sharper walls, slight CPU increase)
    correlation_search_space_smear_deviation: 0.05

    # Loop Closure Parameters
    loop_search_space_dimension: 3.0
    loop_search_space_resolution: 0.03
    loop_search_space_smear_deviation: 0.05

    # Scan Matcher Parameters
    # Penalizing distance variance heavily helps keep straight walls straight
    distance_variance_penalty: 0.5     # TUNED: 0.5 -> 0.3 (Trusts laser geometry more)
    angle_variance_penalty: 2.0

    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 1.5
    minimum_distance_penalty: 0.5
    use_response_expansion: true
    min_pass_through: 10
    occupancy_threshold: 0.2